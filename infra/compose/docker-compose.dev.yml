networks:
  core:
    external: true
    name: cine-platform-core
  observability:
    external: true
    name: cine-platform-observability

volumes:
  postgres_data:
    external: true
    name: cine-platform-postgres-data
  minio_data:
    external: true
    name: cine-platform-minio-data
  grafana_data:
    external: true
    name: cine-platform-grafana-data
  redpanda_data:
    external: true
    name: cine-platform-redpanda-data

services:
  # ---------- profile: core ----------
  postgres:
    image: postgres:16.4
    profiles: ["core"]
    networks: [core]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    profiles: ["core"]
    networks: [core]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.20
    profiles: ["core"]
    networks: [core]
    ports:
      - "1025:1025"
      - "8025:8025"

  # ---------- profile: storage ----------
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    profiles: ["storage"]
    networks: [core]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    profiles: ["storage"]
    networks: [core]
    depends_on: [minio]
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --artifacts-destination s3://mlflow-artifacts
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "5000:5000"

  # ---------- profile: fraud ----------
  redpanda:
    image: redpandadata/redpanda:v24.2.10
    profiles: ["fraud"]
    networks: [core]
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # ---------- profile: assistant ----------
  ollama:
    image: ollama/ollama:0.3.14
    profiles: ["assistant"]
    networks: [core]
    ports:
      - "11434:11434"

  # ---------- profile: observability ----------
  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: ["observability"]
    networks: [observability, core]
    extra_hosts:
      # El backend corre en el host (uvicorn --reload, no como servicio de
      # Compose - ver Makefile), no dentro de la red `core` - se necesita
      # este mapeo para que el scrape de /metrics le llegue (Fase 1).
      - "host.docker.internal:host-gateway"
    volumes:
      - ../observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    profiles: ["observability"]
    networks: [observability]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      # NO se anida bajo /etc/grafana/provisioning (arriba) - montar un
      # segundo bind-mount dentro de un directorio que ya es un bind-mount
      # de solo lectura falla ("read-only file system") porque Docker no
      # puede crear el punto de montaje dentro de el. Ruta separada en su
      # lugar; el `path` del provider en dashboards.yml apunta aqui.
      - ../observability/grafana/dashboards:/etc/grafana/dashboards:ro

  loki:
    image: grafana/loki:3.2.0
    profiles: ["observability"]
    networks: [observability]
    ports:
      - "3100:3100"

  tempo:
    image: grafana/tempo:2.6.0
    profiles: ["observability"]
    networks: [observability]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ../observability/tempo.yml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317"