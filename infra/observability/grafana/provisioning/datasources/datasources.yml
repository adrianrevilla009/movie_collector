apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      # Permite saltar de un span en Tempo a las metricas de ese mismo
      # servicio en Prometheus (y viceversa via exemplars) - sin esto Tempo
      # funciona igual, pero se pierde la navegacion cruzada en Grafana.
      tracesToMetrics:
        datasourceUid: prometheus
      serviceMap:
        datasourceUid: prometheus