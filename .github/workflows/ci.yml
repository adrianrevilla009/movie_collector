name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.x"
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Unit tests
        run: uv run pytest -m "not integration and not e2e" --cov
      - name: pip-audit (dependency vulnerabilities)
        run: uv run pip-audit || true  # no bloquea CI todavia, se endurece en Fase 6 (OWASP A06)

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test -- --run
      - name: npm audit
        run: pnpm audit || true
